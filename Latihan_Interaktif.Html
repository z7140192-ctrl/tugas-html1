<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html lagi</title>
    <style>
        /* -- CSS DASAR --*/
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            
            background-image: 
                radial-gradient(circle at 20% 35%, rgba(0, 80, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 75%, rgba(120, 0, 255, 0.1) 0%, transparent 40%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* -- BULANKu -- */
        .bulan {
            width: 320px; 
            height: 320px;
            background-color: #e2e2e2;
            border-radius: 50%;
            position: absolute;
            top: -70px;
            left: -70px;
            box-shadow: 
                0 0 60px 25px rgba(255, 255, 255, 0.15), 
                0 0 130px 50px rgba(0, 150, 255, 0.1); 
            z-index: 5;
        }

        .kawah { background-color: rgba(0,0,0,0.1); border-radius: 50%; position: absolute; }
        .kawah1 { width: 45px; height: 45px; top: 110px; left: 140px; }
        .kawah2 { width: 30px; height: 30px; top: 200px; left: 80px; }
        .kawah3 { width: 20px; height: 20px; top: 70px; left: 220px; }
        .kawah4 { width: 15px; height: 15px; top: 150px; left: 60px; }
        .kawah5 { width: 22px; height: 22px; top: 250px; left: 170px; }
        .kawah6 { width: 12px; height: 12px; top: 50px; left: 160px; }

        /* --CONTAINER UTAMA -- */
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transform: scale(1.2); 
            transition: transform 0.3s ease;
        }

        h1 { 
            font-size: 40px; 
            margin-bottom: 25px; 
            letter-spacing: 2px; 
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .input-group { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 35px; 
        }
        input[type="text"] {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            padding: 12px 18px;
            width: 200px;
            font-size: 15px;
            outline: none;
        }

        .kotak-utama {
            width: 420px; 
            height: 280px;
            background-color: #c9d1a1; 
            margin-bottom: 25px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: background-color 0.4s ease;
        }

        .status-text { 
            font-size: 18px; 
            margin-bottom: 25px; 
            height: 28px; 
            color: #ddd;
            font-weight: 300;
        }

        .button-group { 
            display: flex; 
            gap: 12px; 
        }

        .btn {
            background-color: #FFF170;
            border: none;
            color: #333;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 8px 15px rgba(255, 241, 112, 0.3); 
        }

        .btn:active {
            background-color: #98FF98;
            color: #000;
            transform: scale(0.92);
        }

        /* -- BINTANG -- */
        #star-field { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .bintang {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: kelip 4s infinite alternate;
        }

        @keyframes kelip {
            0% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.1; transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="bulan">
        <div class="kawah kawah1"></div>
        <div class="kawah kawah2"></div>
        <div class="kawah kawah3"></div>
        <div class="kawah kawah4"></div>
        <div class="kawah kawah5"></div>
        <div class="kawah kawah6"></div>
    </div>

    <div id="star-field"></div>

    <div class="content-container">
        <h1>Latihan Interaktif</h1>

        <div class="input-group">
            <input type="text" id="inputNama" placeholder="Masukan Nama mu">
            <input type="text" id="inputAbsen" placeholder="Nomor Absen">
        </div>

        <div class="kotak-utama" id="kotakUtama"></div>

        <div class="status-text" id="statusText">Menunggu data mu...</div>

        <div class="button-group">
            <button class="btn" onclick="ubahText()">Ubah Text</button>
            <button class="btn" onclick="ubahWarnaKotak()">Ubah Warna</button>
            <button class="btn" onclick="tampilkanWaktu()">Cek Waktu</button>
        </div>
    </div>

    <script>
        function createStars() {
            const field = document.getElementById('star-field');
            const starCount = 180; 

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'bintang';
                const size = Math.random() * 2.5 + 1 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                field.appendChild(star);
            }
        }

        createStars();

        const kotakUtama = document.getElementById('kotakUtama');
        const statusText = document.getElementById('statusText');

        // FUNGSI BARU YANG KAMU MINTA:
        function ubahText() {
            const nama = document.getElementById('inputNama').value;
            const absen = document.getElementById('inputAbsen').value;

            if (nama && absen) {
                // Kalimat sesuai request kamu
                statusText.innerText = "Hai " + nama + ", absen mu ternyata " + absen + "! Salam Kenal";
            } else {
                statusText.innerText = "ISI NAMA DAN ABSEN MU DULU?!?!!";
            }
        }

        function ubahWarnaKotak() {
            const r = Math.floor(Math.random() * 255);
            const g = Math.floor(Math.random() * 255);
            const b = Math.floor(Math.random() * 255);
            kotakUtama.style.backgroundColor = `rgb(${r},${g},${b})`;
            statusText.innerText = "Warna diperbarui!";
        }

        function tampilkanWaktu() {
            const jam = new Date().toLocaleTimeString();
            statusText.innerText = "Waktu galaksi: " + jam;
        }
    </script>
</body>
</html>
